name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: '34'
        ndk-version: 'r21e'
    
    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
    
    - name: Install Expo CLI
      run: npm install -g expo-cli
    
    - name: Prebuild Android
      working-directory: ./NH-S19-App
      run: |
        npx expo prebuild -p android --clean --non-interactive
    
    - name: Build APK
      working-directory: ./NH-S19-App/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: NH-S19-App/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Create Release
      if: success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: build-${{ github.run_number }}
        release_name: Android APK Build ${{ github.run_number }}
        body: 'APK built successfully from commit ${{ github.sha }}'
        draft: false
        prerelease: false
