name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: '34'
    
    - name: Build APK (Direct Gradle)
      run: |
        cd NH-S19-App/android
        chmod +x gradlew
        ls -la
        ./gradlew clean assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: OutbreakSenseAI-APK
        path: NH-S19-App/android/app/build/outputs/apk/debug/app-debug.apk
