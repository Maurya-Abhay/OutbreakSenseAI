name: CI Non-Mobile

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-check:
    name: Backend Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        run: npm install --prefix backend

      - name: Validate backend app import
        run: node -e "import('./backend/src/app.js').then(()=>console.log('backend import ok'))"

  web-build:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web deps
        run: npm install --prefix web

      - name: Build web
        run: npm run build --prefix web

  ai-check:
    name: AI Engine Compile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI deps
        run: pip install -r ai-engine/requirements.txt

      - name: Python syntax compile
        run: python -m compileall ai-engine/app ai-engine/run.py
