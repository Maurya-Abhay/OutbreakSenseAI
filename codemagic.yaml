workflows:
  android-workflow:
    name: Build Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      java: default
      ndk: r21e
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Install Expo CLI
        script: |
          npm install -g expo-cli
      - name: Prebuild
        script: |
          cd NH-S19-App
          npx expo prebuild -p android --clean --non-interactive
      - name: Build APK
        script: |
          cd NH-S19-App/android
          ./gradlew assembleDebug
    artifacts:
      - NH-S19-App/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - workdocing3@gmail.com
        notify:
          success: true
          failure: true