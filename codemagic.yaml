workflows:
  android-workflow:
    name: Build Android APK
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      java: 11
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Install Expo and Prebuild
        script: |
          cd NH-S19-App
          npm install -g expo-cli
          npx expo prebuild -p android --clean --non-interactive
      - name: Build with Gradle
        script: |
          cd NH-S19-App/android
          chmod +x gradlew
          ./gradlew --version
          ./gradlew assembleDebug
    artifacts:
      - NH-S19-App/android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - workdocing3@gmail.com
        notify:
          success: true
          failure: true